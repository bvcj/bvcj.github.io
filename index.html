<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0077b6">
<title>Yuliia Leites</title>

<link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: "Averia Serif Libre", serif;
  background: #fefcfb;
  color: #000814;
  font-size: 16px;
  line-height: 1.5;
  padding: 40px 20px;
}

/* INK CURSOR CANVAS */
#cursorCanvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 9999;
}

.container {
  max-width: 1100px;
  margin: 0;
  padding-top: 60px;
  padding-left: 40px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 40px;
}

h1 {
  font-size: 26px;
  font-weight: 400;
}

h2 {
  font-size: 15px;
  letter-spacing: 1px;
  font-weight: 400;
}

.small {
  font-size: 15px;
  opacity: 0.95;
}

.list {
  list-style: none;
  padding: 0;
}

.list li {
  margin-bottom: 10px;
}

.link {
  text-decoration: none;
  color: #000814;
  position: relative;
}

.link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 1px;
  background: #000814;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.link:hover::after {
  transform: scaleX(1);
}

input, textarea {
  width: 100%;
  padding: 9px;
  margin-bottom: 8px;
  font-family: inherit;
  font-size: 14px;
  border: 1px solid #ccc;
  background: transparent;
  outline: none;
}

input[type="checkbox"] {
  width: auto;
}

button {
  background: #000814;
  color: white;
  border: 2px solid #000814;
  padding: 10px;
  font-family: inherit;
  cursor: pointer;
  width: 100%;
  margin-bottom: 15px;
  transition: all 0.3s ease;
}

button:hover {
  background: white;
  color: #000814;
}

.consent {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  font-size: 13px;
  margin-bottom: 15px;
  width: 100%;
}

.consent span {
  flex: 1;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- INK CURSOR -->
<canvas id="cursorCanvas"></canvas>

<div class="container">

  <h1>Yuliia Leites</h1>
  <div class="small">Psychoanalysis Psychotherapist</div>

  <div class="grid">

    <div>
      <h2>ABOUT</h2>
      <div class="small">
        Psychoanalytic psychotherapist working at the fracture points of war, identity, and psyche.
      </div>
    </div>

    <div>
      <h2>PUBLICATIONS</h2>
      <ul class="list">
        <li><a class="link" href="#">Example</a></li>
      </ul>
    </div>

    <div>

      <h2>CONTACT</h2>

      <input type="text" id="name" placeholder="Your name">
      <textarea id="message" rows="6" placeholder="What would you like to work on?"></textarea>

      <label class="consent">
        <input type="checkbox" id="consent">
        <span>I consent to my information being used to respond to my inquiry and understand it will be kept confidential</span>
      </label>

      <button onclick="sendEmail()">Send Inquiry</button>

    </div>

  </div>

</div>

<script>
function sendEmail() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;
  const consent = document.getElementById("consent").checked;

  if (!consent) {
    alert("Please confirm consent.");
    return;
  }

  const subject = encodeURIComponent("Inquiry from " + name);
  const body = encodeURIComponent(message);

  window.location.href =
    "mailto:yuliialeites@gmail.com?subject=" + subject + "&body=" + body;
}
</script>

<!-- INK CURSOR SCRIPT (FIXED + SIMPLE LINE) -->
<script>
const canvas = document.getElementById("cursorCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

window.addEventListener("mousemove", (e) => {
  points.push({ x: e.clientX, y: e.clientY });

  if (points.length > 80) {
    points.shift();
  }
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.lineJoin = "round";
  ctx.lineCap = "round";

  for (let i = 1; i < points.length; i++) {
    const p1 = points[i - 1];
    const p2 = points[i];

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);

    ctx.strokeStyle = "rgba(0, 119, 182, 0.35)";
    ctx.lineWidth = 2;

    ctx.stroke();
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
